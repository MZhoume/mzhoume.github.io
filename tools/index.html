<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tools</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <style>
        :root {
            --sidebar-width: 18rem;
            --header-height: 4rem;
            --sidebar-mobile-max-width: 86vw;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background-color: var(--pico-background-color, #ffffff);
        }

        header.page-header {
            border-bottom: 1px solid var(--pico-muted-border-color, #d6d6d6);
            margin: 0;
            background-color: var(--pico-background-color, #ffffff);
            position: sticky;
            top: 0;
            z-index: 20;
            min-height: var(--header-height);
        }

        .header-inner {
            display: flex;
            align-items: center;
            justify-content: flex-start;
        }

        .header-inner h1 {
            margin: 0;
        }

        .docs-layout {
            display: grid;
            grid-template-columns: var(--sidebar-width) 1fr;
            min-height: calc(100vh - var(--header-height));
        }

        aside.docs-sidebar {
            border-right: 1px solid var(--pico-muted-border-color, #d6d6d6);
            background-color: var(--pico-card-background-color, #111218);
            color: var(--pico-contrast, #f2f2f2);
            height: calc(100vh - var(--header-height));
            overflow-y: auto;
            position: sticky;
            top: var(--header-height);
        }

        aside.docs-sidebar nav {
            padding: 1rem;
        }

        aside.docs-sidebar ul {
            padding-left: 0;
        }

        aside.docs-sidebar li {
            list-style: none;
        }

        aside.docs-sidebar a {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            padding: 0.6rem 0.8rem;
            border-radius: 0.5rem;
            text-decoration: none;
            color: var(--pico-contrast, #f2f2f2);
        }

        aside.docs-sidebar a[aria-current="page"] {
            background-color: var(--pico-primary-background, #6c47ff);
            color: var(--pico-primary-inverse, #ffffff);
            font-weight: 700;
        }

        .tool-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 1.5rem;
            flex: 0 0 1.5rem;
        }

        .sidebar-section {
            margin: 0.5rem 0 0.6rem;
            font-size: 0.82rem;
            letter-spacing: 0.02em;
            color: var(--pico-muted-color, #a3a3a3);
        }

        main.docs-main {
            padding: 1rem;
        }

        .breadcrumb-bar {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            border-bottom: 1px solid var(--pico-muted-border-color, #d6d6d6);
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
        }

        #sidebar-toggle {
            margin: 0;
            display: none;
            white-space: nowrap;
        }

        nav[aria-label="breadcrumb"] ol {
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            gap: 0.45rem;
            list-style: none;
        }

        nav[aria-label="breadcrumb"] li {
            margin: 0;
        }

        nav[aria-label="breadcrumb"] li + li::before {
            content: "/";
            color: var(--pico-muted-color, #888888);
            margin-right: 0.45rem;
        }

        .sidebar-backdrop {
            display: none;
        }

        @media (max-width: 1024px) {
            .docs-layout {
                grid-template-columns: 1fr;
            }

            #sidebar-toggle {
                display: inline-flex;
            }

            aside.docs-sidebar {
                position: fixed;
                top: 0;
                left: 0;
                width: min(var(--sidebar-mobile-max-width), var(--sidebar-width));
                height: 100vh;
                transform: translateX(-100%);
                transition: transform 0.2s ease;
                z-index: 35;
                border-right: 1px solid var(--pico-muted-border-color, #d6d6d6);
            }

            body.sidebar-open aside.docs-sidebar {
                transform: translateX(0);
            }

            .sidebar-backdrop {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.5);
                z-index: 30;
            }

            body.sidebar-open .sidebar-backdrop {
                display: block;
            }
        }
    </style>
</head>
<body>
    <header class="container-fluid page-header">
        <div class="header-inner">
            <h1>Welcome</h1>
        </div>
    </header>
    <div class="docs-layout">
        <aside id="tools-sidebar" class="docs-sidebar">
            <nav aria-label="Tools sidebar">
                <h2 class="sidebar-section">Tools</h2>
                <ul>
                    <li><a href="/tools/" aria-current="page"><span class="tool-icon" aria-hidden="true">🏠</span><span class="tool-label">Welcome</span></a></li>
                </ul>
            </nav>
        </aside>
        <main class="docs-main container-fluid">
            <div class="breadcrumb-bar">
                <button id="sidebar-toggle" type="button" aria-controls="tools-sidebar" aria-expanded="false" aria-label="Toggle sidebar menu"><span aria-hidden="true">☰</span> Menu</button>
                <nav aria-label="breadcrumb">
                    <ol>
                        <li><a href="/">Home</a></li>
                        <li><span>Tools</span></li>
                        <li aria-current="page"><span>Welcome</span></li>
                    </ol>
                </nav>
            </div>
            <p>Select a tool from the sidebar to get started.</p>
        </main>
    </div>
    <button class="sidebar-backdrop" type="button" aria-label="Close sidebar"></button>
    <script>
        const sidebarToggle = document.querySelector("#sidebar-toggle");
        const sidebarBackdrop = document.querySelector(".sidebar-backdrop");
        const setSidebarOpen = (open) => {
            document.body.classList.toggle("sidebar-open", open);
            sidebarToggle.setAttribute("aria-expanded", String(open));
        };
        const toggleSidebar = () => setSidebarOpen(!document.body.classList.contains("sidebar-open"));
        const closeSidebar = () => setSidebarOpen(false);
        sidebarToggle.addEventListener("click", toggleSidebar);
        sidebarBackdrop.addEventListener("click", closeSidebar);
    </script>
</body>
</html>
