<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="author" content="Ming Zhou" />
    <meta name="description" content="Landing page for Ming Zhou." />
    <meta name="theme-color" content="#06d6a0" />

    <title>Ming Zhou</title>

    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <style>
      :root {
        color-scheme: light dark;

        --color-blob-in-top: #ef476f;
        --color-blob-out-top: #ffd166;
        --color-bg: #06d6a0;
        --color-blob-out-bottom: #00bbf9;
        --color-blob-in-bottom: #9b5de5;

        --color-text: #000000;
        --color-aux: rgb(0 0 0 / 50%);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --color-blob-in-top: #7f2438;
          --color-blob-out-top: #806933;
          --color-bg: #036b50;
          --color-blob-out-bottom: #005d7d;
          --color-blob-in-bottom: #4e2f73;

          --color-text: #ffffff;
          --color-aux: rgb(255 255 255 / 50%);
        }
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        min-height: 100%;
      }

      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        font-family: Georgia, "Times New Roman", Times, serif;
        color: var(--color-text);
        background-color: var(--color-bg);
        position: relative;
        overflow: hidden;
      }

      .bg-ambient {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        pointer-events: none;
      }

      .out-top,
      .in-top,
      .out-bottom,
      .in-bottom {
        fill: var(--blob-color);
        animation: rotate var(--blob-speed) linear infinite;
        transform-origin: var(--blob-origin-x) var(--blob-origin-y);
      }

      .out-top {
        --blob-color: var(--color-blob-out-top);
        --blob-speed: 60s;
        --blob-origin-x: 13px;
        --blob-origin-y: 25px;
      }

      .in-top {
        --blob-color: var(--color-blob-in-top);
        --blob-speed: 30s;
        --blob-origin-x: 13px;
        --blob-origin-y: 25px;
      }

      .out-bottom {
        --blob-color: var(--color-blob-out-bottom);
        --blob-speed: 75s;
        --blob-origin-x: 84px;
        --blob-origin-y: 93px;
      }

      .in-bottom {
        --blob-color: var(--color-blob-in-bottom);
        --blob-speed: 45s;
        --blob-origin-x: 84px;
        --blob-origin-y: 93px;
      }

      .top-bar,
      .hero-main,
      .site-footer {
        position: relative;
        z-index: 1;
      }

      .top-bar {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        padding: 30px 30px 0;
      }

      .social-nav {
        display: flex;
        align-items: center;
      }

      .social-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 48px;
        height: 48px;
        line-height: 0;
        color: inherit;
        text-decoration: none;
      }

      .social-link:focus-visible {
        outline: 2px solid var(--color-aux);
        outline-offset: 4px;
      }

      .social-link svg {
        display: block;
        width: 36px;
        height: 36px;
        padding: 6px;
        fill: var(--color-aux);
      }

      .hero-main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .hero-title {
        margin: 0;
        font-size: clamp(48px, 6vw, 96px);
        letter-spacing: clamp(1px, 0.3vw, 3px);
        font-weight: 500;
      }

      .site-footer {
        font-size: 12px;
        text-align: center;
        color: var(--color-aux);
      }

      @media (prefers-reduced-motion: reduce) {
        .bg-ambient path {
          animation: none;
        }
      }

      @keyframes rotate {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>

  <body>
    <svg
      class="bg-ambient"
      preserveAspectRatio="xMidYMid slice"
      viewBox="10 10 80 80"
      aria-hidden="true"

      <path

        d="M37-5C25.1-14.7,5.7-19.1-9.2-10-28.5,1.8-32.7,31.1-19.8,49c15.5,21.5,52.6,22,67.2,2.3C59.4,35,53.7,8.5,37-5Z"
      />
      <path
        class="in-top"
        d="M20.6,4.1C11.6,1.5-1.9,2.5-8,11.2-16.3,23.1-8.2,45.6,7.4,50S42.1,38.9,41,24.5C40.2,14.1,29.4,6.6,20.6,4.1Z"
      />
      <path
        class="out-bottom"
        d="M105.9,48.6c-12.4-8.2-29.3-4.8-39.4.8-23.4,12.8-37.7,51.9-19.1,74.1s63.9,15.3,76-5.6c7.6-13.3,1.8-31.1-2.3-43.8C117.6,63.3,114.7,54.3,105.9,48.6Z"
      />
      <path
        class="in-bottom"
        d="M102,67.1c-9.6-6.1-22-3.1-29.5,2-15.4,10.7-19.6,37.5-7.6,47.8s35.9,3.9,44.5-12.5C115.5,92.6,113.9,74.6,102,67.1Z"
      />
    </svg>

    <header class="top-bar">
      <nav class="social-nav" aria-label="Social links">
        <a
          href="https://github.com/MZhoume"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="GitHub (opens in new tab)"
          class="social-link"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 16 16"
            aria-hidden="true"
            focusable="false"
          >
            <path
              d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8"
            />
          </svg>
        </a>
        <a
          href="https://linkedin.com/in/MCZhou"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="LinkedIn (opens in new tab)"
          class="social-link"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 16 16"
            aria-hidden="true"
            focusable="false"
          >
            <path
              d="M0 1.146C0 .513.526 0 1.175 0h13.65C15.474 0 16 .513 16 1.146v13.708c0 .633-.526 1.146-1.175 1.146H1.175C.526 16 0 15.487 0 14.854zm4.943 12.248V6.169H2.542v7.225zm-1.2-8.212c.837 0 1.358-.554 1.358-1.248-.015-.709-.52-1.248-1.342-1.248S2.4 3.226 2.4 3.934c0 .694.521 1.248 1.327 1.248zm4.908 8.212V9.359c0-.216.016-.432.08-.586.173-.431.568-.878 1.232-.878.869 0 1.216.662 1.216 1.634v3.865h2.401V9.25c0-2.22-1.184-3.252-2.764-3.252-1.274 0-1.845.7-2.165 1.193v.025h-.016l.016-.025V6.169h-2.4c.03.678 0 7.225 0 7.225z"
            />
          </svg>
        </a>
      </nav>
    </header>

    <main class="hero-main" aria-labelledby="hero-title">
      <h1 class="hero-title" id="hero-title">Hi 👋<br />It's Ming</h1>
    </main>

    <footer class="site-footer">
      <p>&copy; <time id="year" datetime="2026">2026</time> Ming Zhou</p>
    </footer>

    <script>
      const yearEl = document.getElementById("year");
      if (yearEl) {
        const year = String(new Date().getFullYear());
        yearEl.textContent = year;
        yearEl.dateTime = year;
      }
    </script>
  </body>
</html>
