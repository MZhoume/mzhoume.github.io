<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Start</title>
    <style>
      :root {
        --color-text: #16222f;
        --color-border: rgb(22 34 47 / 14%);
        --color-placeholder: rgb(22 34 47 / 50%);
        --color-focus: #3f84bb;
        --color-focus-ring: rgb(63 132 187 / 20%);
        --color-bg: rgb(240 244 248 / 66%);
        --page-background-tint: var(--color-bg);
        --page-background-image: none;
        --bookmark-title-color: var(--color-text);
        --page-top-space: clamp(96px, 24dvh, 220px);
        --color-surface: rgb(248 250 253 / 78%);
        --color-surface-strong: rgb(251 253 255 / 86%);
        --color-surface-muted: rgb(231 238 245 / 78%);
        --color-error: #a85149;
        --color-accent: #2d678b;
        --color-on-accent: #f7fbff;
        --color-danger: #b45a52;
        --color-danger-soft: rgb(180 90 82 / 16%);
        --color-danger-border: rgb(180 90 82 / 24%);
        --color-on-danger: #fff;
        --radius-pill: 999px;
        --radius-card: 24px;
        --blur-soft: 6px;
        --blur-strong: 10px;
        --shadow-soft: 0 12px 28px rgb(15 23 42 / 12%);
        --shadow-soft-hover: 0 16px 34px rgb(15 23 42 / 16%);
        --shadow-strong: 0 18px 38px rgb(15 23 42 / 22%);
        --shadow-accent: 0 18px 36px rgb(45 103 139 / 24%);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --color-text: #e9eff6;
          --color-border: rgb(226 232 240 / 16%);
          --color-placeholder: rgb(226 232 240 / 52%);
          --color-focus: #6faed7;
          --color-focus-ring: rgb(111 174 215 / 26%);
          --color-bg: rgb(12 19 29 / 54%);
          --page-background-tint: var(--color-bg);
          --page-background-image: none;
          --bookmark-title-color: var(--color-text);
          --color-surface: rgb(15 24 36 / 78%);
          --color-surface-strong: rgb(19 29 43 / 86%);
          --color-surface-muted: rgb(28 40 58 / 74%);
          --color-error: #f1a098;
          --color-accent: #5f98c2;
          --color-on-accent: #08131b;
          --color-danger: #f0a298;
          --color-danger-soft: rgb(240 162 152 / 18%);
          --color-danger-border: rgb(240 162 152 / 28%);
          --color-on-danger: #101418;
          --shadow-soft: 0 14px 32px rgb(0 0 0 / 24%);
          --shadow-soft-hover: 0 18px 38px rgb(0 0 0 / 28%);
          --shadow-strong: 0 20px 42px rgb(0 0 0 / 36%);
          --shadow-accent: 0 20px 38px rgb(95 152 194 / 24%);
        }
      }

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      html,
      body {
        margin: 0;
      }

      button,
      input,
      textarea {
        font: inherit;
      }

      input {
        appearance: none;
        -webkit-appearance: none;
      }

      body {
        min-height: 100dvh;
        position: relative;
        overflow: hidden;
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        background-color: var(--page-background-tint);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        background-color: var(--page-background-tint);
        background-image: var(--page-background-image);
        background-position: center center;
        background-repeat: no-repeat;
        background-size: cover;
      }

      .page-shell {
        width: 100%;
        height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding: var(--page-top-space) 32px
          calc(32px + env(safe-area-inset-bottom));
        overflow-y: auto;
        overflow-x: hidden;
        overscroll-behavior-y: contain;
        -webkit-overflow-scrolling: touch;
      }

      .start-form,
      .bookmarks {
        width: min(100%, 1024px);
      }

      .bookmarks {
        margin-top: 20px;
      }

      .bookmark-icon-wrap,
      .bookmark-text-input,
      .omnibox-input {
        backdrop-filter: blur(var(--blur-soft));
        -webkit-backdrop-filter: blur(var(--blur-soft));
      }

      .bookmark-icon-wrap,
      .bookmark-remove,
      .omnibox-submit {
        display: grid;
        place-items: center;
      }

      .bookmarks-edit-button,
      .bookmark-dialog-button,
      .bookmark-text-input,
      .omnibox-input {
        border: 1px solid var(--color-border);
        color: var(--color-text);
        background: var(--color-surface-strong);
      }

      .bookmarks-edit-button,
      .bookmark-dialog-button,
      .omnibox-submit,
      .bookmark-remove,
      .bookmark-link,
      .bookmark-add,
      .bookmark-text-input,
      .omnibox-input {
        transition:
          background-color 120ms ease,
          border-color 120ms ease,
          color 120ms ease,
          box-shadow 120ms ease,
          transform 120ms ease;
      }

      .bookmarks-edit-button:focus-visible,
      .bookmark-remove:focus-visible,
      .bookmark-link:focus-visible,
      .bookmark-add:focus-visible,
      .bookmark-text-input:focus-visible,
      .bookmark-dialog-button:focus-visible,
      .omnibox-submit:focus-visible {
        outline: 2px solid var(--color-focus);
        outline-offset: 2px;
      }

      .bookmark-link:focus-visible .bookmark-icon-wrap,
      .bookmark-add:focus-visible .bookmark-icon-wrap,
      .bookmarks-edit-button:focus-visible,
      .bookmark-dialog-button:focus-visible,
      .bookmark-text-input:focus-visible,
      .omnibox-submit:focus-visible {
        box-shadow:
          0 0 0 4px var(--color-focus-ring),
          var(--shadow-soft);
      }

      .bookmarks-header {
        display: flex;
        justify-content: center;
        margin-top: 14px;
      }

      .bookmarks-edit-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        min-height: 36px;
        border-radius: var(--radius-pill);
        font-size: 13px;
        font-weight: 600;
        line-height: 1;
        padding: 0 16px;
        cursor: pointer;
        box-shadow: var(--shadow-soft);
        backdrop-filter: blur(var(--blur-strong));
        -webkit-backdrop-filter: blur(var(--blur-strong));
      }

      .bookmarks-edit-button::before {
        content: "✎";
        font-size: 12px;
        line-height: 1;
        opacity: 0.85;
      }

      .bookmarks-edit-button:hover {
        box-shadow: var(--shadow-soft-hover);
        transform: translateY(-1px);
      }

      .bookmarks-edit-button.is-active {
        border-color: transparent;
        background: var(--color-accent);
        color: var(--color-on-accent);
        box-shadow: var(--shadow-accent);
      }

      .bookmarks-edit-button.is-active::before {
        content: "✓";
      }

      .bookmarks-grid {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        gap: 10px;
      }

      .bookmark-tile {
        position: relative;
      }

      .bookmark-link,
      .bookmark-add {
        width: 100%;
        border: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        padding: 6px 2px;
        background: transparent;
        color: var(--color-text);
        text-decoration: none;
        cursor: pointer;
      }

      .bookmark-icon-wrap {
        width: 72px;
        height: 72px;
        border-radius: var(--radius-card);
        background-color: var(--bookmark-background-tint, var(--color-surface));
        transition: background-color 120ms ease;
      }

      .bookmark-add-icon {
        font-size: 34px;
        line-height: 1;
      }

      .bookmark-icon {
        width: 40px;
        height: 40px;
        object-fit: contain;
      }

      .bookmark-title {
        width: 100%;
        text-align: center;
        font-size: 13px;
        font-weight: 600;
        color: var(--bookmark-title-color, currentColor);
        line-clamp: 2;
        line-height: 1.25;
        min-height: 2.5em;
        overflow: hidden;
        white-space: normal;
        overflow-wrap: anywhere;
        display: -webkit-box;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
      }

      .bookmark-remove {
        position: absolute;
        top: 0px;
        left: calc(50% + 36px);
        width: 20px;
        height: 20px;
        padding: 0;
        border: 1px solid var(--color-danger-border);
        border-radius: 50%;
        background: var(--color-danger-soft);
        color: var(--color-danger);
        font-size: 18px;
        font-weight: 700;
        line-height: 0;
        box-shadow: var(--shadow-soft);
        cursor: pointer;
        transform: translateX(-50%);
      }

      .bookmark-dialog {
        width: min(100%, 420px);
        padding: 0;
        border: 1px solid var(--color-border);
        border-radius: var(--radius-card);
        color: var(--color-text);
        background: var(--color-surface);
        box-shadow: var(--shadow-strong);
      }

      .bookmark-dialog::backdrop {
        background: rgb(0 0 0 / 35%);
        backdrop-filter: blur(var(--blur-soft));
        -webkit-backdrop-filter: blur(var(--blur-soft));
      }

      .bookmark-dialog-form {
        display: grid;
        gap: 16px;
        padding: 24px;
      }

      .bookmark-dialog-title {
        margin: 0;
        font-size: 20px;
      }

      .bookmark-field {
        display: grid;
        gap: 8px;
      }

      .bookmark-label {
        font-size: 14px;
        font-weight: 600;
      }

      .bookmark-text-input {
        width: 100%;
        min-height: 44px;
        border-radius: 14px;
        padding: 10px 14px;
      }

      .bookmark-error {
        margin: 0;
        font-size: 13px;
        font-weight: 600;
        min-height: 1em;
        color: var(--color-error);
      }

      .bookmark-dialog-actions {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
      }

      .bookmark-dialog-button {
        min-height: 40px;
        border-radius: var(--radius-pill);
        padding: 0 16px;
        box-shadow: var(--shadow-soft);
        cursor: pointer;
      }

      .bookmark-dialog-button[data-variant="secondary"] {
        background: var(--color-surface-muted);
      }

      .bookmark-dialog-button[data-variant="primary"] {
        border-color: transparent;
        background: var(--color-accent);
        color: var(--color-on-accent);
        box-shadow: var(--shadow-accent);
      }

      .omnibox {
        position: relative;
      }

      .omnibox-input {
        width: 100%;
        min-height: 48px;
        max-height: min(45dvh, 240px);
        border-radius: var(--radius-card);
        padding: 12px 72px 12px 24px;
        font-size: 18px;
        line-height: 1.35;
        resize: none;
        overflow-y: auto;
      }

      .omnibox-input::placeholder {
        color: var(--color-placeholder);
      }

      .omnibox-input:focus {
        border-color: var(--color-focus);
        box-shadow:
          0 0 0 4px var(--color-focus-ring),
          var(--shadow-soft-hover);
        outline: none;
      }

      .omnibox-input:focus-visible {
        outline: 2px solid var(--color-focus);
        outline-offset: -2px;
      }

      .omnibox-submit {
        position: absolute;
        right: 3px;
        bottom: 7px;
        width: 42px;
        height: 42px;
        border: 1px solid var(--color-border);
        border-radius: 21px;
        background: var(--color-surface-muted);
        box-shadow: var(--shadow-soft);
        color: var(--color-text);
        cursor: pointer;
      }

      .omnibox-submit-icon {
        width: 20px;
        height: 20px;
        stroke: currentColor;
        stroke-width: 2.25;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }

      @media (max-width: 640px) {
        .page-shell {
          padding-inline: 16px;
        }

        .bookmarks-grid {
          grid-template-columns: repeat(5, minmax(0, 1fr));
        }

        .bookmark-dialog {
          width: calc(100% - 24px);
        }

        .bookmark-dialog-form {
          padding: 20px;
        }
      }

      @media (max-width: 480px) {
        .bookmarks-grid {
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <main class="page-shell">
      <form class="start-form" id="startForm" aria-label="Start page search">
        <div class="omnibox">
          <label class="visually-hidden" for="omniboxInput">
            Search the web or type a URL
          </label>
          <textarea
            id="omniboxInput"
            class="omnibox-input"
            name="q"
            inputmode="search"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="none"
            spellcheck="false"
            placeholder="Search or type URL"
            rows="1"
          ></textarea>
          <button class="omnibox-submit" type="submit" aria-label="Go">
            <svg
              class="omnibox-submit-icon"
              viewBox="0 0 24 24"
              aria-hidden="true"
              focusable="false"
            >
              <path d="M5 12h12" />
              <path d="M13 6l6 6-6 6" />
            </svg>
          </button>
        </div>
      </form>

      <section class="bookmarks" aria-label="Bookmark shortcuts">
        <div id="bookmarksGrid" class="bookmarks-grid"></div>
        <div class="bookmarks-header">
          <button
            id="bookmarksEditButton"
            class="bookmarks-edit-button"
            type="button"
            aria-pressed="false"
          >
            Edit
          </button>
        </div>
      </section>
    </main>

    <dialog
      id="bookmarkDialog"
      class="bookmark-dialog"
      aria-labelledby="bookmarkDialogTitle"
    >
      <form
        id="bookmarkDialogForm"
        class="bookmark-dialog-form"
        method="dialog"
      >
        <h2 id="bookmarkDialogTitle" class="bookmark-dialog-title">
          Add bookmark
        </h2>
        <div class="bookmark-field">
          <label class="bookmark-label" for="bookmarkUrlInput">Address</label>
          <input
            id="bookmarkUrlInput"
            class="bookmark-text-input"
            name="url"
            type="text"
            inputmode="url"
            autocomplete="url"
            autocorrect="off"
            autocapitalize="none"
            spellcheck="false"
            required
          />
        </div>
        <div class="bookmark-field">
          <label class="bookmark-label" for="bookmarkTitleInput">Name</label>
          <input
            id="bookmarkTitleInput"
            class="bookmark-text-input"
            name="title"
            type="text"
            maxlength="80"
            autocomplete="off"
          />
        </div>
        <p id="bookmarkDialogError" class="bookmark-error" role="alert"></p>
        <div class="bookmark-dialog-actions">
          <button
            class="bookmark-dialog-button"
            type="button"
            id="bookmarkDialogCancelButton"
            data-variant="secondary"
          >
            Cancel
          </button>
          <button
            class="bookmark-dialog-button"
            type="submit"
            data-variant="primary"
          >
            Save
          </button>
        </div>
      </form>
    </dialog>

    <script src="https://unpkg.com/fast-average-color@9.5.2/dist/index.browser.min.js"></script>
    <script>
      const startForm = document.getElementById("startForm");
      const omniboxInput = document.getElementById("omniboxInput");
      const bookmarksGrid = document.getElementById("bookmarksGrid");
      const bookmarksEditButton = document.getElementById(
        "bookmarksEditButton",
      );
      const bookmarkDialog = document.getElementById("bookmarkDialog");
      const bookmarkDialogForm = document.getElementById("bookmarkDialogForm");
      const bookmarkDialogCancelButton = document.getElementById(
        "bookmarkDialogCancelButton",
      );
      const bookmarkUrlInput = document.getElementById("bookmarkUrlInput");
      const bookmarkTitleInput = document.getElementById("bookmarkTitleInput");
      const bookmarkDialogError = document.getElementById(
        "bookmarkDialogError",
      );

      const BOOKMARKS_STORAGE_KEY = "startPageBookmarks";
      const BING_CACHE_KEY = "bingBackgroundCache";
      const BING_CACHE_TTL_MS = 1000 * 60 * 60 * 6;
      const FAVICON_FAILURE_TTL_MS = 1000 * 60 * 60 * 24 * 7;
      const FAVICON_TINT_TTL_MS = 1000 * 60 * 60 * 24 * 30;
      const MAX_FAVICON_FAILURES = 128;
      const MAX_FAVICON_TINTS = 256;
      const FALLBACK_ICON_TINT_RGB = [111, 124, 138];
      const REMOTE_ASSET_PROXY_URL = "https://cors.io/?url=";
      const BING_API_URL =
        "https://www.bing.com/HPImageArchive.aspx?format=js&idx=0&n=1&mkt=en-US";
      const SEARCH_URL_BASE = "https://www.google.com/search?q=";
      const GOOGLE_FAVICON_URL =
        "https://www.google.com/s2/favicons?sz=128&domain=";
      const DOMAIN_LIKE_PATTERN =
        /^(localhost|([a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?\.)+[a-z]{2,})(:\d{2,5})?(\/[^\s]*)?(\?[^\s]*)?(#[^\s]*)?$/i;
      const fastAverageColor =
        typeof window.FastAverageColor === "function"
          ? new window.FastAverageColor()
          : null;

      let bookmarksEditMode = false;
      let bookmarksState = [];

      // Storage helpers
      function readJsonStorage(key) {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : null;
      }

      function writeJsonStorage(key, value) {
        localStorage.setItem(key, JSON.stringify(value));
      }

      function persistBookmarksState() {
        saveBookmarks(bookmarksState);
      }

      // Favicon cache
      function pruneFaviconFailureCache(cache) {
        const entries = Object.entries(cache);

        if (entries.length <= MAX_FAVICON_FAILURES) {
          return false;
        }

        entries
          .sort(function (left, right) {
            return right[1] - left[1];
          })
          .slice(MAX_FAVICON_FAILURES)
          .forEach(function (entry) {
            delete cache[entry[0]];
          });

        return true;
      }

      function pruneFaviconTintCache(cache) {
        const entries = Object.entries(cache);

        if (entries.length <= MAX_FAVICON_TINTS) {
          return false;
        }

        entries
          .sort(function (left, right) {
            return right[1].timestamp - left[1].timestamp;
          })
          .slice(MAX_FAVICON_TINTS)
          .forEach(function (entry) {
            delete cache[entry[0]];
          });

        return true;
      }

      // Color and background
      function clampByte(value) {
        return Math.max(0, Math.min(255, Math.round(value)));
      }

      function mixChannel(value, target, amount) {
        return clampByte(value + (target - value) * amount);
      }

      function invertRgb(rgb) {
        return rgb.map(function (channel) {
          return clampByte(255 - channel);
        });
      }

      function readCachedTintRgb(value) {
        if (!Array.isArray(value) || value.length < 3) {
          return null;
        }

        const rgb = value.slice(0, 3).map(function (channel) {
          return Number(channel);
        });

        return rgb.every(Number.isFinite)
          ? rgb.map(function (channel) {
              return clampByte(channel);
            })
          : null;
      }

      function normalizeBookmarkFaviconData(value) {
        const now = Date.now();
        const normalized = {
          failures: {},
          tints: {},
          lastSuccessfulSource: null,
        };

        if (value && typeof value === "object" && !Array.isArray(value)) {
          const failures = value.failures;
          const tints = value.tints;

          if (
            failures &&
            typeof failures === "object" &&
            !Array.isArray(failures)
          ) {
            Object.keys(failures).forEach(function (source) {
              const timestamp = Number(failures[source]);

              if (
                Number.isFinite(timestamp) &&
                now - timestamp < FAVICON_FAILURE_TTL_MS
              ) {
                normalized.failures[source] = timestamp;
              }
            });
          }

          if (tints && typeof tints === "object" && !Array.isArray(tints)) {
            Object.keys(tints).forEach(function (source) {
              const entry = tints[source];
              const timestamp = Number(entry?.timestamp);
              const tintRgb = readCachedTintRgb(entry?.tint);

              if (
                Number.isFinite(timestamp) &&
                now - timestamp < FAVICON_TINT_TTL_MS &&
                tintRgb
              ) {
                normalized.tints[source] = {
                  timestamp: timestamp,
                  tint: tintRgb,
                };
              }
            });
          }

          if (typeof value.lastSuccessfulSource === "string") {
            normalized.lastSuccessfulSource = value.lastSuccessfulSource;
          }
        }

        pruneFaviconFailureCache(normalized.failures);
        pruneFaviconTintCache(normalized.tints);
        return normalized;
      }

      function ensureBookmarkFaviconData(bookmark) {
        bookmark.favicon = normalizeBookmarkFaviconData(bookmark.favicon);
        return bookmark.favicon;
      }

      function getCachedFaviconTint(bookmark, source) {
        if (!source) {
          return null;
        }

        const faviconData = ensureBookmarkFaviconData(bookmark);
        const entry = faviconData.tints[source];

        if (!entry) {
          return null;
        }

        if (Date.now() - entry.timestamp < FAVICON_TINT_TTL_MS) {
          return entry.tint;
        }

        delete faviconData.tints[source];
        persistBookmarksState();
        return null;
      }

      function rememberFaviconTint(bookmark, source, tintRgb) {
        if (!source || !tintRgb) {
          return;
        }

        const faviconData = ensureBookmarkFaviconData(bookmark);
        faviconData.tints[source] = {
          timestamp: Date.now(),
          tint: tintRgb,
        };
        pruneFaviconTintCache(faviconData.tints);
        persistBookmarksState();
      }

      function rememberSuccessfulFaviconSource(bookmark, source) {
        if (!source) {
          return;
        }

        const faviconData = ensureBookmarkFaviconData(bookmark);

        if (faviconData.lastSuccessfulSource === source) {
          return;
        }

        faviconData.lastSuccessfulSource = source;
        persistBookmarksState();
      }

      function getLastSuccessfulFaviconSource(bookmark) {
        const faviconData = ensureBookmarkFaviconData(bookmark);
        return faviconData.lastSuccessfulSource || null;
      }

      function refreshBookmarkIconTints() {
        const bookmarksById = new Map(
          bookmarksState.map(function (bookmark) {
            return [bookmark.id, bookmark];
          }),
        );

        bookmarksGrid
          .querySelectorAll(".bookmark-icon-wrap[data-bookmark-id]")
          .forEach(function (iconWrapElement) {
            const bookmark = bookmarksById.get(
              iconWrapElement.dataset.bookmarkId,
            );
            const iconElement = iconWrapElement.querySelector(".bookmark-icon");

            if (!bookmark || !iconElement) {
              return;
            }

            const displayedSource = iconElement.dataset.source || "";

            if (!displayedSource) {
              setBookmarkIconTint(iconWrapElement, FALLBACK_ICON_TINT_RGB);
              return;
            }

            setBookmarkIconTint(
              iconWrapElement,
              getCachedFaviconTint(bookmark, displayedSource),
            );
          });
      }

      function hasFaviconFailure(bookmark, source) {
        if (!source) {
          return false;
        }

        const faviconData = ensureBookmarkFaviconData(bookmark);
        const timestamp = faviconData.failures[source];

        if (!timestamp) {
          return false;
        }

        if (Date.now() - timestamp < FAVICON_FAILURE_TTL_MS) {
          return true;
        }

        delete faviconData.failures[source];
        persistBookmarksState();
        return false;
      }

      function rememberFaviconFailure(bookmark, source) {
        if (!source) {
          return;
        }

        const faviconData = ensureBookmarkFaviconData(bookmark);
        faviconData.failures[source] = Date.now();
        pruneFaviconFailureCache(faviconData.failures);
        persistBookmarksState();
      }

      function clearFaviconFailure(bookmark, source) {
        if (!source) {
          return;
        }

        const faviconData = ensureBookmarkFaviconData(bookmark);

        if (!(source in faviconData.failures)) {
          return;
        }

        delete faviconData.failures[source];
        persistBookmarksState();
      }

      function normalizeBookmark(item) {
        return {
          id: item.id,
          title: item.title,
          url: item.url,
          favicon: normalizeBookmarkFaviconData(item.favicon),
        };
      }

      // Network and proxy payload helpers
      function buildProxyUrl(urlValue) {
        return REMOTE_ASSET_PROXY_URL + encodeURIComponent(urlValue);
      }

      async function fetchJsonWithTimeout(url, timeoutMs) {
        const controller = new AbortController();
        const timeoutId = window.setTimeout(function () {
          controller.abort();
        }, timeoutMs);

        try {
          const response = await fetch(url, {
            signal: controller.signal,
          });
          return response.json();
        } finally {
          window.clearTimeout(timeoutId);
        }
      }

      function unwrapCorsProxyJsonPayload(data) {
        if (!data || typeof data !== "object" || Array.isArray(data)) {
          return data;
        }

        if (typeof data.body === "string") {
          try {
            return JSON.parse(data.body);
          } catch {
            return null;
          }
        }

        return data;
      }

      async function fetchBingBackgroundUrl() {
        try {
          const proxyUrl = buildProxyUrl(BING_API_URL);
          const responseData = await fetchJsonWithTimeout(proxyUrl, 30000);
          const data = unwrapCorsProxyJsonPayload(responseData);
          const imagePath = data?.images?.[0]?.url;

          return imagePath ? "https://www.bing.com" + imagePath : null;
        } catch {
          return null;
        }
      }

      function createBookmarkId() {
        if (window.crypto && typeof window.crypto.randomUUID === "function") {
          return window.crypto.randomUUID();
        }

        return (
          "bookmark-" + Date.now() + "-" + Math.random().toString(16).slice(2)
        );
      }

      function getThemeTintPalette(tintRgb) {
        const prefersDark =
          window.matchMedia &&
          window.matchMedia("(prefers-color-scheme: dark)").matches;

        return {
          bookmarkTitle:
            "rgb(" +
            invertRgb(tintRgb).join(" ") +
            " / " +
            (prefersDark ? "94%" : "90%") +
            ")",
          tint:
            "rgb(" +
            tintRgb.join(" ") +
            " / " +
            (prefersDark ? "62%" : "58%") +
            ")",
          overlay:
            "rgb(" +
            tintRgb.join(" ") +
            " / " +
            (prefersDark ? "10%" : "6%") +
            ")",
        };
      }

      function applyBackgroundTint(tintRgb) {
        const rootStyle = document.documentElement.style;

        if (!tintRgb) {
          rootStyle.removeProperty("--page-background-tint");
          rootStyle.removeProperty("--bookmark-title-color");
          return null;
        }

        const palette = getThemeTintPalette(tintRgb);
        rootStyle.setProperty("--page-background-tint", palette.tint);
        rootStyle.setProperty("--bookmark-title-color", palette.bookmarkTitle);
        return palette.overlay;
      }

      function applyBackgroundTheme(backgroundUrl, tintRgb) {
        const overlayColor = applyBackgroundTint(tintRgb);
        setBackgroundImage(backgroundUrl, overlayColor);
      }

      function setBackgroundImage(backgroundUrl, overlayColor) {
        const rootStyle = document.documentElement.style;

        if (!backgroundUrl) {
          rootStyle.removeProperty("--page-background-image");
          return;
        }

        const layers = [];

        if (overlayColor) {
          layers.push(
            "linear-gradient(" + overlayColor + ", " + overlayColor + ")",
          );
        }

        layers.push("url(" + JSON.stringify(backgroundUrl) + ")");
        rootStyle.setProperty("--page-background-image", layers.join(", "));
      }

      function readBingCacheEntry() {
        const cachedData = readJsonStorage(BING_CACHE_KEY);

        if (
          !cachedData ||
          typeof cachedData !== "object" ||
          Array.isArray(cachedData)
        ) {
          return null;
        }

        const backgroundUrl = isHttpUrl(cachedData.url) ? cachedData.url : null;

        if (!backgroundUrl) {
          return null;
        }

        return {
          fetchedAt: Number(cachedData.fetchedAt) || 0,
          url: backgroundUrl,
          tint: readCachedTintRgb(cachedData.tint),
        };
      }

      function writeBingCacheEntry(cacheEntry) {
        writeJsonStorage(BING_CACHE_KEY, {
          fetchedAt: cacheEntry.fetchedAt,
          url: cacheEntry.url,
          tint: cacheEntry.tint,
        });
      }

      function applyCachedBackgroundTheme() {
        const cachedEntry = readBingCacheEntry();

        if (!cachedEntry) {
          return;
        }

        applyBackgroundTheme(cachedEntry.url, cachedEntry.tint);
      }

      async function calculateBackgroundTint(urlValue) {
        if (!fastAverageColor) {
          throw new Error("fast-average-color is unavailable");
        }

        const attempts = [urlValue, buildProxyUrl(urlValue)];

        for (const attempt of attempts) {
          try {
            const color = await fastAverageColor.getColorAsync(attempt, {
              algorithm: "dominant",
              crossOrigin: "anonymous",
              silent: true,
            });

            if (color?.error) {
              continue;
            }

            const tintRgb = readCachedTintRgb(color?.value);

            if (tintRgb) {
              return tintRgb;
            }
          } catch {
            // try next attempt
          }
        }

        throw new Error("Background tint could not be derived");
      }

      async function tryCalculateBackgroundTint(urlValue) {
        try {
          return await calculateBackgroundTint(urlValue);
        } catch {
          return null;
        }
      }

      function isHttpUrl(value) {
        try {
          const parsed = new URL(value);
          return parsed.protocol === "http:" || parsed.protocol === "https:";
        } catch {
          return false;
        }
      }

      function isBareDomain(value) {
        if (/\s/.test(value)) {
          return false;
        }

        return DOMAIN_LIKE_PATTERN.test(value);
      }

      // Omnibox
      function resolveDestination(rawValue) {
        const value = rawValue.trim();

        if (!value) {
          return null;
        }

        if (isHttpUrl(value)) {
          return value;
        }

        if (isBareDomain(value)) {
          return "https://" + value;
        }

        return SEARCH_URL_BASE + encodeURIComponent(value);
      }

      function handleFormSubmit(event) {
        event.preventDefault();

        const destination = resolveDestination(omniboxInput.value);
        if (!destination) {
          return;
        }

        window.location.assign(destination);
      }

      function resizeOmniboxInput() {
        const maxHeight = window.innerHeight * 0.45;

        omniboxInput.style.height = "auto";
        omniboxInput.style.height =
          Math.min(omniboxInput.scrollHeight, maxHeight) + "px";
      }

      function handleOmniboxKeyDown(event) {
        if (event.key !== "Enter" || event.isComposing) {
          return;
        }

        event.preventDefault();
        startForm.requestSubmit();
      }

      function normalizeBookmarkUrl(rawValue) {
        if (typeof rawValue !== "string") {
          return null;
        }

        const trimmed = rawValue.trim();
        if (!trimmed) {
          return null;
        }

        if (/\s/.test(trimmed)) {
          return null;
        }

        const hasProtocol = /^[a-z]+:\/\//i.test(trimmed);
        if (!hasProtocol && !isBareDomain(trimmed)) {
          return null;
        }

        const withProtocol = hasProtocol ? trimmed : "https://" + trimmed;

        try {
          const parsed = new URL(withProtocol);
          if (parsed.protocol !== "http:" && parsed.protocol !== "https:") {
            return null;
          }

          if (!parsed.hostname || parsed.hostname.includes("%")) {
            return null;
          }

          return parsed.href;
        } catch {
          return null;
        }
      }

      function getBookmarkTitle(urlValue) {
        try {
          const parsed = new URL(urlValue);
          return parsed.hostname.replace(/^www\./i, "") || urlValue;
        } catch {
          return urlValue;
        }
      }

      // Bookmarks
      function setBookmarkDialogError(message) {
        bookmarkDialogError.textContent = message || "";
      }

      function closeBookmarkDialog() {
        bookmarkDialog.close();
        setBookmarkDialogError("");
        bookmarkDialogForm.reset();
      }

      function openBookmarkDialog() {
        setBookmarkDialogError("");
        bookmarkUrlInput.value = "";
        bookmarkTitleInput.value = "";
        bookmarkDialog.showModal();
        bookmarkUrlInput.focus();
        bookmarkUrlInput.select();
      }

      function handleBookmarkDialogInput() {
        setBookmarkDialogError("");
      }

      function handleBookmarkDialogSubmit(event) {
        event.preventDefault();

        const normalizedUrl = normalizeBookmarkUrl(bookmarkUrlInput.value);
        if (!normalizedUrl) {
          setBookmarkDialogError("Please enter a valid URL or domain.");
          bookmarkUrlInput.focus();
          return;
        }

        const suggestedTitle = getBookmarkTitle(normalizedUrl);
        const title = bookmarkTitleInput.value.trim() || suggestedTitle;
        const bookmarks = bookmarksState.slice();

        bookmarks.push({
          id: createBookmarkId(),
          title: title,
          url: normalizedUrl,
          favicon: normalizeBookmarkFaviconData(null),
        });

        commitBookmarks(bookmarks);
        closeBookmarkDialog();
        renderBookmarks();
      }

      function loadBookmarks() {
        const parsed = readJsonStorage(BOOKMARKS_STORAGE_KEY);
        return Array.isArray(parsed)
          ? parsed
              .filter(function (item) {
                return (
                  item &&
                  typeof item.id === "string" &&
                  typeof item.title === "string" &&
                  typeof item.url === "string" &&
                  isHttpUrl(item.url)
                );
              })
              .map(normalizeBookmark)
          : [];
      }

      function saveBookmarks(bookmarks) {
        writeJsonStorage(BOOKMARKS_STORAGE_KEY, bookmarks);
      }

      function setBookmarksState(bookmarks) {
        bookmarksState = bookmarks;
      }

      function commitBookmarks(bookmarks) {
        setBookmarksState(bookmarks);
        saveBookmarks(bookmarks);
      }

      function getFaviconCandidates(urlValue) {
        try {
          const parsed = new URL(urlValue);
          return [
            parsed.origin + "/favicon.ico",
            GOOGLE_FAVICON_URL + parsed.hostname,
          ];
        } catch {
          return [];
        }
      }

      function buildFallbackIcon(label) {
        const first = (label || "?").trim().charAt(0).toUpperCase() || "?";
        const xmlSafeFirst = first
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&apos;");
        const svg =
          "<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'>" +
          "<rect width='64' height='64' rx='14' fill='#818181'/>" +
          "<text x='32' y='41' text-anchor='middle' font-family='Arial' font-size='28' fill='white'>" +
          xmlSafeFirst +
          "</text></svg>";

        return "data:image/svg+xml," + encodeURIComponent(svg);
      }

      function getAvailableFaviconSources(bookmark, preferredSource) {
        const sources = [];

        if (preferredSource && !hasFaviconFailure(bookmark, preferredSource)) {
          sources.push(preferredSource);
        }

        getFaviconCandidates(bookmark.url).forEach(function (source) {
          if (
            source !== preferredSource &&
            !hasFaviconFailure(bookmark, source)
          ) {
            sources.push(source);
          }
        });

        return sources;
      }

      function getBookmarkIconTintColor(tintRgb) {
        const prefersDark =
          window.matchMedia &&
          window.matchMedia("(prefers-color-scheme: dark)").matches;
        const targetRgb = prefersDark ? [30, 41, 56] : [233, 239, 245];
        const softenedRgb = tintRgb.map(function (channel, index) {
          return mixChannel(
            channel,
            targetRgb[index],
            prefersDark ? 0.84 : 0.88,
          );
        });

        return (
          "rgb(" +
          softenedRgb.join(" ") +
          " / " +
          (prefersDark ? "56%" : "68%") +
          ")"
        );
      }

      function setBookmarkIconTint(iconWrapElement, tintRgb) {
        if (!iconWrapElement) {
          return;
        }

        if (!tintRgb) {
          iconWrapElement.style.removeProperty("--bookmark-background-tint");
          return;
        }

        iconWrapElement.style.setProperty(
          "--bookmark-background-tint",
          getBookmarkIconTintColor(tintRgb),
        );
      }

      function applyBookmarkFallbackIcon(
        imgElement,
        iconWrapElement,
        bookmark,
      ) {
        imgElement.dataset.source = "";
        imgElement.src = buildFallbackIcon(bookmark.title);
        setBookmarkIconTint(iconWrapElement, FALLBACK_ICON_TINT_RGB);
      }

      function createBookmarkFaviconController(
        imgElement,
        iconWrapElement,
        bookmark,
      ) {
        return {
          imgElement: imgElement,
          iconWrapElement: iconWrapElement,
          bookmark: bookmark,
          sources: getAvailableFaviconSources(
            bookmark,
            getLastSuccessfulFaviconSource(bookmark),
          ),
          sourceIndex: 0,
          currentSource: null,
          tintRequestId: 0,
          triedSavedFallback: false,
        };
      }

      function removeBookmarkFaviconListeners(
        controller,
        handleLoad,
        handleError,
      ) {
        controller.imgElement.removeEventListener("load", handleLoad);
        controller.imgElement.removeEventListener("error", handleError);
      }

      function setBookmarkFaviconSource(controller, source) {
        controller.currentSource = source;
        controller.imgElement.dataset.source = source || "";

        if (source) {
          controller.imgElement.src = source;
        }
      }

      function getNextBookmarkFaviconSource(controller) {
        if (controller.sourceIndex < controller.sources.length) {
          const nextSource = controller.sources[controller.sourceIndex];
          controller.sourceIndex += 1;
          return nextSource;
        }

        if (!controller.triedSavedFallback) {
          const lastSuccessfulSource = getLastSuccessfulFaviconSource(
            controller.bookmark,
          );

          controller.triedSavedFallback = true;

          if (
            lastSuccessfulSource &&
            lastSuccessfulSource !== controller.currentSource
          ) {
            return lastSuccessfulSource;
          }
        }

        return null;
      }

      async function calculateBookmarkFaviconTint(bookmark, source) {
        if (!fastAverageColor || !source) {
          return null;
        }

        const cachedTint = getCachedFaviconTint(bookmark, source);

        if (cachedTint) {
          return cachedTint;
        }

        const attempts = [source, buildProxyUrl(source)];

        for (const attempt of attempts) {
          try {
            const color = await fastAverageColor.getColorAsync(attempt, {
              algorithm: "dominant",
              crossOrigin: "anonymous",
              silent: true,
            });

            if (color?.error) {
              continue;
            }

            const tintRgb = readCachedTintRgb(color?.value);

            if (tintRgb) {
              rememberFaviconTint(bookmark, source, tintRgb);
              return tintRgb;
            }
          } catch {
            // try next attempt
          }
        }

        return null;
      }

      async function updateBookmarkFaviconTint(controller, preferredSource) {
        const requestId = ++controller.tintRequestId;
        const tintSources = getAvailableFaviconSources(
          controller.bookmark,
          preferredSource,
        );

        for (const source of tintSources) {
          const tintRgb = await calculateBookmarkFaviconTint(
            controller.bookmark,
            source,
          );

          if (
            requestId !== controller.tintRequestId ||
            !controller.imgElement.isConnected ||
            !controller.iconWrapElement.isConnected
          ) {
            return;
          }

          if (tintRgb) {
            setBookmarkIconTint(controller.iconWrapElement, tintRgb);
            return;
          }
        }

        if (
          requestId === controller.tintRequestId &&
          controller.imgElement.isConnected &&
          controller.iconWrapElement.isConnected
        ) {
          setBookmarkIconTint(
            controller.iconWrapElement,
            FALLBACK_ICON_TINT_RGB,
          );
        }
      }

      function handleBookmarkFaviconLoad(controller, handleLoad, handleError) {
        clearFaviconFailure(controller.bookmark, controller.currentSource);
        rememberSuccessfulFaviconSource(
          controller.bookmark,
          controller.currentSource,
        );
        controller.imgElement.dataset.source = controller.currentSource || "";
        updateBookmarkFaviconTint(controller, controller.currentSource);
        removeBookmarkFaviconListeners(controller, handleLoad, handleError);
      }

      function handleBookmarkFaviconError(controller, handleLoad, handleError) {
        rememberFaviconFailure(controller.bookmark, controller.currentSource);

        const nextSource = getNextBookmarkFaviconSource(controller);

        if (nextSource) {
          setBookmarkFaviconSource(controller, nextSource);
          return;
        }

        controller.currentSource = null;
        applyBookmarkFallbackIcon(
          controller.imgElement,
          controller.iconWrapElement,
          controller.bookmark,
        );
        removeBookmarkFaviconListeners(controller, handleLoad, handleError);
      }

      function applyBookmarkFavicon(imgElement, iconWrapElement, bookmark) {
        const controller = createBookmarkFaviconController(
          imgElement,
          iconWrapElement,
          bookmark,
        );

        function handleLoad() {
          handleBookmarkFaviconLoad(controller, handleLoad, handleError);
        }

        function handleError() {
          handleBookmarkFaviconError(controller, handleLoad, handleError);
        }

        setBookmarkIconTint(iconWrapElement, null);
        imgElement.addEventListener("load", handleLoad);
        imgElement.addEventListener("error", handleError);
        handleError();
      }

      function renderBookmarkTile(bookmark) {
        const tile = document.createElement("div");
        tile.className = "bookmark-tile";

        const link = document.createElement("a");
        link.className = "bookmark-link";
        link.href = bookmark.url;

        const iconWrap = document.createElement("span");
        iconWrap.className = "bookmark-icon-wrap";
        iconWrap.dataset.bookmarkId = bookmark.id;

        const icon = document.createElement("img");
        icon.className = "bookmark-icon";
        icon.alt = "";
        icon.decoding = "async";
        icon.loading = "lazy";
        icon.dataset.source = "";
        applyBookmarkFavicon(icon, iconWrap, bookmark);

        const title = document.createElement("span");
        title.className = "bookmark-title";
        title.textContent = bookmark.title;

        iconWrap.appendChild(icon);
        link.appendChild(iconWrap);
        link.appendChild(title);
        tile.appendChild(link);

        if (bookmarksEditMode) {
          const removeButton = document.createElement("button");
          removeButton.className = "bookmark-remove";
          removeButton.type = "button";
          removeButton.setAttribute(
            "aria-label",
            "Remove bookmark " + bookmark.title,
          );
          removeButton.textContent = "\u00d7";
          removeButton.addEventListener("click", function (event) {
            event.preventDefault();
            removeBookmark(bookmark.id);
          });
          tile.appendChild(removeButton);
        }

        return tile;
      }

      function renderAddTile() {
        const tile = document.createElement("div");
        tile.className = "bookmark-tile";

        const addButton = document.createElement("button");
        addButton.type = "button";
        addButton.className = "bookmark-add";
        addButton.setAttribute("aria-label", "Add bookmark");

        const iconWrap = document.createElement("span");
        iconWrap.className = "bookmark-icon-wrap";

        const icon = document.createElement("span");
        icon.className = "bookmark-add-icon";
        icon.setAttribute("aria-hidden", "true");
        icon.textContent = "+";

        iconWrap.appendChild(icon);

        const title = document.createElement("span");
        title.className = "bookmark-title";
        title.textContent = "Add";

        addButton.appendChild(iconWrap);
        addButton.appendChild(title);
        addButton.addEventListener("click", openBookmarkDialog);
        tile.appendChild(addButton);

        return tile;
      }

      function renderBookmarks() {
        const fragment = document.createDocumentFragment();

        bookmarksState.forEach(function (bookmark) {
          fragment.appendChild(renderBookmarkTile(bookmark));
        });

        if (bookmarksEditMode) {
          fragment.appendChild(renderAddTile());
        }

        bookmarksGrid.replaceChildren(fragment);
      }

      function removeBookmark(bookmarkId) {
        const updated = bookmarksState.filter(function (bookmark) {
          return bookmark.id !== bookmarkId;
        });

        commitBookmarks(updated);
        renderBookmarks();
      }

      function syncBookmarksEditButton() {
        bookmarksEditButton.textContent = bookmarksEditMode ? "Done" : "Edit";
        bookmarksEditButton.classList.toggle("is-active", bookmarksEditMode);
        bookmarksEditButton.setAttribute(
          "aria-pressed",
          bookmarksEditMode ? "true" : "false",
        );
      }

      function toggleBookmarksEditMode() {
        bookmarksEditMode = !bookmarksEditMode;
        syncBookmarksEditButton();
        renderBookmarks();
      }

      async function applyBingBackground() {
        const cachedEntry = readBingCacheEntry();
        const now = Date.now();
        const hasFreshCache =
          cachedEntry && now - cachedEntry.fetchedAt < BING_CACHE_TTL_MS;

        const backgroundUrl = hasFreshCache
          ? cachedEntry.url
          : await fetchBingBackgroundUrl();
        let tintRgb = hasFreshCache ? cachedEntry.tint : null;

        if (!backgroundUrl) {
          return;
        }

        applyBackgroundTheme(backgroundUrl, tintRgb);

        if (!tintRgb) {
          tintRgb = await tryCalculateBackgroundTint(backgroundUrl);

          if (tintRgb) {
            applyBackgroundTheme(backgroundUrl, tintRgb);
          }
        }

        writeBingCacheEntry({
          fetchedAt: now,
          url: backgroundUrl,
          tint: tintRgb,
        });
      }

      function handleColorSchemeChange() {
        applyCachedBackgroundTheme();
        refreshBookmarkIconTints();
      }

      function bindColorSchemeChangeListener(colorSchemeMediaQuery) {
        if (!colorSchemeMediaQuery) {
          return;
        }

        if (typeof colorSchemeMediaQuery.addEventListener === "function") {
          colorSchemeMediaQuery.addEventListener(
            "change",
            handleColorSchemeChange,
          );
          return;
        }

        if (typeof colorSchemeMediaQuery.addListener === "function") {
          colorSchemeMediaQuery.addListener(handleColorSchemeChange);
        }
      }

      // Startup
      function initializeStartPage() {
        const colorSchemeMediaQuery =
          window.matchMedia &&
          window.matchMedia("(prefers-color-scheme: dark)");

        setBookmarksState(loadBookmarks());
        resizeOmniboxInput();
        bookmarksEditMode = false;
        syncBookmarksEditButton();
        bookmarksEditButton.addEventListener("click", toggleBookmarksEditMode);
        omniboxInput.addEventListener("input", resizeOmniboxInput);
        omniboxInput.addEventListener("keydown", handleOmniboxKeyDown);
        bookmarkDialogCancelButton.addEventListener(
          "click",
          closeBookmarkDialog,
        );
        bookmarkDialog.addEventListener("cancel", function (event) {
          event.preventDefault();
          closeBookmarkDialog();
        });
        bookmarkUrlInput.addEventListener("input", handleBookmarkDialogInput);
        bookmarkTitleInput.addEventListener("input", handleBookmarkDialogInput);
        bookmarkDialogForm.addEventListener(
          "submit",
          handleBookmarkDialogSubmit,
        );
        bindColorSchemeChangeListener(colorSchemeMediaQuery);

        renderBookmarks();
      }

      startForm.addEventListener("submit", handleFormSubmit);
      applyBingBackground();
      initializeStartPage();
    </script>
  </body>
</html>
