<!DOCTYPE html>
<html lang="en" data-theme="dark">

    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="icon" type="image/x-icon" href="favicon.ico">
        <meta name="description" content="Landing Page for Ming Zhou">
        <meta name="author" content="Ming Zhou">

        <title>Ming Zhou</title>

        <link rel="stylesheet"
              href="https://cdn.jsdelivr.net/npm/@picocss/pico@2.0.6/css/pico.min.css"
              integrity="sha384-7P0NVe9LPDbUCAF+fH2R8Egwz1uqNH83Ns/bfJY0fN2XCDBMUI2S9gGzIOIRBKsA"
              crossorigin="anonymous">
        <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400;1,700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

        <style>
            html { scroll-behavior: smooth; }

            @media (prefers-reduced-motion: reduce) {
                html { scroll-behavior: auto; }
                .btn-circle:hover svg { animation: none; }
            }

            :root {
                --pico-font-family: 'Lora', serif;
                --pico-font-family-sans-serif: 'Lora', serif;
                --pico-background-color: #000;
                --pico-color: #fff;
                --pico-primary: #42DCA3;
                --pico-primary-hover: #1d9b6c;
                --pico-primary-focus: rgba(66, 220, 163, 0.25);
                --pico-primary-inverse: #000;
            }

            /* Base — explicit so the page renders correctly even if the CDN fails */
            body { background-color: #000; color: #fff; }

            h1, h2, h3, h4, h5, h6 {
                font-family: 'Montserrat', sans-serif;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 1px;
            }

            /* Navigation — transparent at page-top on desktop */
            nav.site-nav {
                position: fixed;
                top: 0; left: 0; right: 0;
                z-index: 1000;
                background: transparent;
                border-bottom: 1px solid transparent;
                padding: 1.25rem 1rem;
                font-family: 'Montserrat', sans-serif;
                text-transform: uppercase;
                letter-spacing: 1px;
                transition: padding 0.5s ease-in-out;
            }

            /* Gradient blur overlay: black at top, smoothly fading to transparent at bottom */
            nav.site-nav::before {
                content: '';
                position: absolute;
                inset: 0;
                z-index: -1;
                background: linear-gradient(to bottom, rgba(0, 0, 0, 0.85) 0%, rgba(0, 0, 0, 0) 100%);
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
                opacity: 0;
                transition: opacity 0.5s ease-in-out;
            }

            @media (max-width: 767px) {
                nav.site-nav { padding: 0.75rem 1rem; }
            }

            /* JS adds .scrolled once the user scrolls past the hero */
            nav.site-nav.scrolled { padding: 0.75rem 1rem; }
            nav.site-nav.scrolled::before { opacity: 1; }

            nav.site-nav .nav-inner {
                display: flex;
                align-items: center;
                justify-content: space-between;
                width: 100%;
                max-width: 1140px;
                margin: 0 auto;
            }

            nav.site-nav .nav-brand {
                display: inline-flex;
                align-items: center;
                gap: 0.4rem;
                font-size: 1rem;
                font-weight: 700;
                color: #fff;
                text-decoration: none;
            }

            nav.site-nav .nav-brand .light { font-weight: 400; }

            nav.site-nav .nav-brand:hover,
            nav.site-nav .nav-links a:hover { color: rgba(255, 255, 255, 0.8); }

            nav.site-nav .nav-links {
                display: flex;
                gap: 1.5rem;
                list-style: none;
                margin: 0; padding: 0;
            }

            nav.site-nav .nav-links a {
                color: #fff;
                text-decoration: none;
                font-size: 0.9rem;
                transition: color 0.2s ease-in-out;
            }

            /* Hero */
            body > header.intro {
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                text-align: center;
                color: #fff;
                background: url('img/intro-bg.jpg') bottom center / cover no-repeat #000;
                padding: 6rem 1rem 3rem;
                margin: 0;
            }

            .intro-body {
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            .brand-heading {
                font-size: clamp(3rem, 8vw, 6rem);
                font-weight: 400;
                color: #fff;
                margin: 0 0 1rem;
            }

            .intro-text {
                font-size: clamp(1.125rem, 2.5vw, 1.625rem);
                color: #fff;
                margin-bottom: 2rem;
            }

            @keyframes pulse {
                0%, 100% { transform: scale(1); }
                50%       { transform: scale(1.2); }
            }

            .btn-circle {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                width: 70px; height: 70px;
                border: 2px solid #fff;
                border-radius: 50%;
                color: #fff;
                background: transparent;
                text-decoration: none;
                transition: background 0.3s ease-in-out;
                margin-top: 0.5rem;
            }

            .btn-circle:hover { background: rgba(255, 255, 255, 0.1); }
            .btn-circle:hover svg { animation: pulse 1.5s linear infinite; }

            /* Contact */
            #contact {
                background-color: #000;
                padding: clamp(5rem, 8vw, 6rem) 1rem;
                text-align: center;
            }

            .contact-wrapper {
                max-width: 700px;
                margin: 0 auto;
            }

            #contact h2 { color: #fff; margin: 0 0 1.5rem; }

            #contact p {
                color: #fff;
                font-size: clamp(1.125rem, 2vw, 1.25rem);
                margin-bottom: 0.625rem;
            }

            .social-buttons {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 1rem;
                list-style: none;
                margin: 1.5rem 0 0; padding: 0;
            }

            .social-buttons li { list-style: none; }

            @media (max-width: 767px) {
                .social-buttons { flex-direction: column; align-items: center; }
            }

            /* Use var(--pico-primary) for theme consistency; fallback ensures styling without Pico */
            .social-buttons a[role="button"] {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                gap: 0.5rem;
                width: 10rem;
                padding: 0.75rem 1.5rem;
                border: 1px solid var(--pico-primary, #42DCA3);
                border-radius: 0;
                color: var(--pico-primary, #42DCA3);
                background-color: transparent;
                text-decoration: none;
                font-family: 'Montserrat', sans-serif;
                text-transform: uppercase;
                letter-spacing: 1px;
                transition: color 0.3s ease-in-out, background-color 0.3s ease-in-out;
            }

            .social-buttons a[role="button"]:hover {
                color: var(--pico-primary-inverse, #000);
                background-color: var(--pico-primary, #42DCA3);
            }

            /* Footer */
            body > footer {
                background-color: #000;
                padding: 3rem 1rem;
                text-align: center;
                border-top: none;
            }

            body > footer p { color: #fff; margin: 0; font-size: 0.8125rem; }
        </style>
    </head>

    <body>
        <!-- Navigation -->
        <nav class="site-nav" role="navigation" aria-label="Main navigation">
            <div class="nav-inner">
                <a class="nav-brand" href="#page-top">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 12c2.761 0 5-2.239 5-5s-2.239-5-5-5-5 2.239-5 5 2.239 5 5 5zm0 2c-3.337 0-10 1.671-10 5v2h20v-2c0-3.329-6.663-5-10-5z"/></svg>
                    <span class="light">Ming</span> Zhou
                </a>
                <ul class="nav-links">
                    <li><a href="#contact">Contact</a></li>
                </ul>
            </div>
        </nav>

        <!-- Hero -->
        <header id="page-top" class="intro">
            <div class="intro-body">
                <h1 class="brand-heading">Hi 👋</h1>
                <p class="intro-text">Is it me that you're looking for?</p>
                <a href="#contact" class="btn-circle" aria-label="Scroll down to contact">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="7 13 12 18 17 13"/><polyline points="7 7 12 12 17 7"/></svg>
                </a>
            </div>
        </header>

        <!-- Contact -->
        <section id="contact">
            <div class="contact-wrapper">
                <h2>Contact Ming Zhou</h2>
                <p>Feel free to email me for anything, or to just say hello!</p>
                <p>contact [at] mzhou.me</p>
                <ul class="social-buttons">
                    <li>
                        <a href="https://linkedin.com/in/MCZhou" role="button" class="outline" target="_blank" rel="noopener noreferrer">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>
                            LinkedIn
                        </a>
                    </li>
                    <li>
                        <a href="https://github.com/MZhoume" role="button" class="outline" target="_blank" rel="noopener noreferrer">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                            GitHub
                        </a>
                    </li>
                </ul>
            </div>
        </section>

        <!-- Footer -->
        <footer>
            <p>Copyright &copy; Ming Zhou <span id="copyright-year"></span></p>
        </footer>

        <script>
            document.getElementById('copyright-year').textContent = new Date().getFullYear();

            // Nav: transparent at top, gradient blur shown after user scrolls
            (function () {
                var nav = document.querySelector('.site-nav');
                function onScroll() {
                    nav.classList.toggle('scrolled', window.scrollY > 0);
                }
                window.addEventListener('scroll', onScroll, { passive: true });
                onScroll();
            }());
        </script>
    </body>
</html>
